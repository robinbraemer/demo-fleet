<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fleet Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1><span>Fleet</span> Dashboard</h1>
      <button class="btn" id="add-btn">+ Add Vehicle</button>
    </header>

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-controls">
        <button class="filter-btn active" data-filter="">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="idle">Idle</button>
        <button class="filter-btn" data-filter="maintenance">Maintenance</button>
      </div>
      <div class="vehicle-list" id="vehicle-list"></div>
    </aside>

    <!-- Detail -->
    <main class="detail-panel" id="detail-panel">
      <p class="placeholder">Select a vehicle to see details</p>
    </main>
  </div>

  <!-- Add Vehicle Modal -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal">
      <h3>Add Vehicle</h3>
      <form id="add-form">
        <div class="form-group">
          <label for="name">Vehicle Name</label>
          <input type="text" id="name" name="name" required placeholder="e.g. Truck Zeta" />
        </div>
        <div class="form-group">
          <label for="type">Type</label>
          <select id="type" name="type">
            <option value="truck">Truck</option>
            <option value="van">Van</option>
            <option value="sedan">Sedan</option>
          </select>
        </div>
        <div class="form-group">
          <label for="driver">Driver</label>
          <input type="text" id="driver" name="driver" required placeholder="e.g. Jane Doe" />
        </div>
        <div class="form-group">
          <label for="fuel">Fuel Level (%)</label>
          <input type="number" id="fuel" name="fuel" min="0" max="100" value="100" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="modal-close">Cancel</button>
          <button type="submit" class="btn">Add</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
